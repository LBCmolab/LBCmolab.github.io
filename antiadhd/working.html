<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>error</title>
    <link id="favicon" rel="icon" href="green.svg">

    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #404040;
        }
        
        #container {
            text-align: center;
            background: #404040;
            padding: 40px;
            border-radius: 10px;
        }
        
        div {
            font-size: 36px;
            font-weight: bold;
            color: #fff;
            margin: 10px 0;
        }

        @keyframes flash {
            0% { opacity: 1; }
            50% { opacity: .5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="setting" style="font-size:70px;color:#ffffff;animation: flash 2s infinite;">- - -</div>
        <div style="color:#808080;">
            Work:
            <a id="workout" style="color:#808000;">-</a>,
            Fun:
            <a id="funout" style="color:#008080;">-</a>.
        </div>
        <div style="color:#808080;">
        	<a id="rateout" style="color:#008000;">-</a>% fun.
            Current:
            <a id="nowout" style="color:#008000;">-</a>.
        </div>
        <div style='margin-top:40px;'></div>
        <div id="phaseButtons" style="font-size:20px;">
            <span onclick="setPhase('work')" style="cursor:pointer;color:#808080;margin: 0 10px;">Work</span>
            <span onclick="setPhase('neutral')" style="cursor:pointer;color:#808080;margin: 0 10px;">None</span>
            <span onclick="setPhase('fun')" style="cursor:pointer;color:#808080;margin: 0 10px;">Fun</span>
        </div>
        <div id="modifyButtons" style="font-size: 20px;">
            <span onclick="change(-300000)" style="cursor:pointer;color:#808080;margin: 0 10px;">Extra work</span>
            <span onclick="change(300000)" style="cursor:pointer;color:#808080;margin: 0 10px;">Extra fun</span>
        </div>
    </div>
    <a id="outer"></a>

    <! SCRIPT STARTS HERE!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!>
    <script>
        const setting = document.getElementById('setting');
        const favicon = document.getElementById('favicon');
        const APIkey = "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"
        let work = 5;
        let fun = 2;
        let none = 0;
        let phase = "neutral";
        let last = Date.now();
        let output = "none";
        

        function setPhase(newPhase) {
            
            if ( phase === "work" ) {
            	work += Date.now() - last;
            } else if ( phase === "fun" ) {
            	fun += Date.now() - last;
            } else if ( phase === "neutral" ) {
            	none += Date.now() - last;
            }
            
            last = Date.now()
            phase = newPhase;
            
            // start of otehr programer code
            const buttons = document.querySelectorAll('#phaseButtons span');
            buttons.forEach(btn => btn.style.color = "#808080");
            event.target.style.color = "rgb(255,255,255)";
            // end of other programer code

            if (phase === "work") {
                setting.textContent = "Working";
                document.title = "Working"
                setting.style.color = "rgb(255,255,0)";
                favicon.href="yellow.svg";
            } else if (phase === "fun") {
                setting.textContent = "On Break";
                document.title = "Taking a break"
                setting.style.color = "rgb(0,255,255)";
                favicon.href="cyan.svg";
            } else if (phase === "neutral") {
                setting.textContent = "Neutral";
                document.title = 'Idle'
                setting.style.color = "rgb(0,255,0)";
                favicon.href="green.svg";
            }
            
            update()
        }

        function change( a ) {
        	if ( a < 0 ) {
            	work -= a;
            } else {
            	fun += a;
            }
        }
        
        function update() {
        	let rate = Math.round( ( fun ) / ( fun + work ) * 100 );
        	document.getElementById("funout").innerHTML = Math.round(fun/6000)/10;
            document.getElementById("workout").innerHTML = Math.round(work/6000)/10;
            document.getElementById("rateout").innerHTML = rate;
            document.getElementById("nowout").innerHTML = Math.round(((Date.now()-last)/6000))/10;
            output = `Is <a class="highlight">${document.title}</a>, and has been for <a class="highlight">${(Math.round(((Date.now()-last)/6000))/10)}</a> muinutes.<br>Total of <a class="highlight">${Math.round(work/6000)/10}</a> muinutes working and <a class="highlight">${Math.round(fun/6000)/10}</a> muinutes off-task.<br>They have spent <a class="highlight">${rate}</a>% of their time off task. (ideal 15-20%)`;
            if ( phase === "work" && Date.now() % 2000 < 1000 ) {
                favicon.href="yellow.svg";
            } else if (phase === "fun" && Date.now() % 2000 < 1000) {
                favicon.href="cyan.svg";
            } else if (phase === "neutral") {
                favicon.href="green.svg";
            } else {
                favicon.href="Ellipse 1.svg";
            }
        }

        function putRepoData() {
            const content = output;
  		    const encodedContent = btoa(content);
            
            fetch(`https://api.github.com/repos/LBCmolab/backend.LBCmolab.github.io/contents/workingTimerInfo.txt`, {
                method: 'PUT',
                headers: {
                    'Authorization': `token ${APIkey}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    message: 'Updating file content',
                    content: encodedContent,
                    //sha: await getFileSHA() // Get current file SHA for updating
                })
            })
        }

        async function getFileSHA() {
            const response = await fetch(`https://api.github.com/repos/LBCmolab/backend.LBCmolab.github.io/contents/workingTimerInfo.txt`, {
                method: 'GET',
                headers: {
                    'Authorization': `token ${APIkey}`,
                    'Accept': 'application/vnd.github.v3.raw'
                }
            });
        
            if (!response.ok) {
                throw new Error('Error fetching file SHA: ' + response.statusText);
            }
        
            const data = await response.json();
            return data.sha;
        }

        
        setInterval(update, 1000);
        setInterval(putRepoData, 10000);
    </script>
</body>
