<!doctype html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: #000;
            color: #fff;
            font-family: Roboto
        }

        .timer {
            width: 240px;
            height: 240px;
            display: grid;
            place-items: center;
            position: relative;
        }

        svg {
            width: 240px;
            height: 240px;
            transform: rotate(-90deg);
        }

        .track {
            stroke: #404040;
            stroke-width: 5;
            fill: none;
        }

        .bar {
            stroke: #fff;
            stroke-width: 5;
            fill: none;
            stroke-linecap: round;
            transition: stroke-dashoffset 1s linear;
        }

        .center {
            position: absolute;
            text-align: center;
            line-height: 1;
        }

        #time {
            font-size: 46px;
            font-weight: 800;
            letter-spacing: 0.5px;
        }

        #sub {
            margin-top: 10px;
            font-size: 14px;
            color: rgba(234, 242, 255, .75);
        }
    </style>
</head>

<body>
    <div class="timer">
        <svg viewBox="0 0 100 100" aria-hidden="true">
            <circle class="track" cx="50" cy="50" r="40"></circle>
            <circle class="bar" id="bar" cx="50" cy="50" r="40"></circle>
        </svg>

        <div class="center">
            <div id="time">15</div>
            <div id="sub">work</div>
        </div>
    </div>

    <script>
        const bar = document.getElementById('bar');
        const time = document.getElementById('time');
        const out = document.getElementById('sub');
        
        let total = time.textContent * 60;
        let t = total;
        let work = true
        let up = false

        const r = 40;
        const C = 2 * Math.PI * r;

        bar.style.strokeDasharray = C;
        bar.style.strokeDashoffset = 0;

        document.body.addEventListener('click', change, true); 

        function change() {
            if (up === false) {
                sub.textContent = "fun"
                up = true;
                total = t - 5*60
                t = total
            } else {
                sub.textContent = "work"
                up = false;
                total = t + 15*60
                t = total
            }
            time.style.color="white";
            bar.style.stroke="white";
        }

        const tick = setInterval(() => {
            if ( up ) t++; else t--;

            time.textContent = Math.round((Math.abs(t) + 30) / 60);

            // done: 0% -> 100%
            const done = (total - t) / total;
            bar.style.strokeDashoffset = C * (1 - done);

            if (t === 0){
                if (up === false) {
                    time.style.color="yellow";
                    bar.style.stroke="yellow";
                } else {
                    time.style.color="cyan";
                    bar.style.stroke="cyan";
                }
            };
        }, 1000);
    </script>
</body>

</html>
