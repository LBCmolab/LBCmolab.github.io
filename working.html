<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>error</title>
    <link id="favicon" rel="icon" href="green.svg">

    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #404040;
        }
        
        #container {
            text-align: center;
            background: #404040;
            padding: 40px;
            border-radius: 10px;
        }
        
        div {
            font-size: 36px;
            font-weight: bold;
            color: #fff;
            margin: 10px 0;
        }

        @keyframes flash {
            0% { opacity: 1; }
            50% { opacity: .5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="setting" style="font-size:70px;color:#ffffff;animation: flash 2s infinite;">- - -</div>
        <div style="color:#808080;">
            Fun:
            <a id="funout" style="color:#808000;">-</a>,
            Work:
            <a id="workout" style="color:#008080;">-</a>.
        </div>
        <div style="color:#808080;">
        	<a id="rateout" style="color:#008000;">-</a>% fun.
            Curent:
            <a id="nowout" style="color:#008000;">-</a>.
        </div>
        <div style='margin-top:40px;'></div>
        <div id="phaseButtons" style="font-size:20px;">
            <span onclick="setPhase('work')" style="cursor:pointer;color:#808080;margin: 0 10px;">Work</span>
            <span onclick="setPhase('neutral')" style="cursor:pointer;color:#808080;margin: 0 10px;">None</span>
            <span onclick="setPhase('fun')" style="cursor:pointer;color:#808080;margin: 0 10px;">Fun</span>
        </div>
        <div id="modifyButtons" style="font-size: 20px;">
            <span onclick="change(-300)" style="cursor:pointer;color:#808080;margin: 0 10px;">Extra work</span>
            <span onclick="change(300)" style="cursor:pointer;color:#808080;margin: 0 10px;">Extra fun</span>
        </div>
    </div>
    <a id="outer"></a>

    <! SCRIPT STARTS HERE!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!>
    <script>
        const setting = document.getElementById('setting');
        const favicon = document.getElementById('favicon');
        let work = 0;
        let fun = 0;
        let none = 0;
        let phase = "neutral";
        let last = Date.now();
        let output = "none";
        

        function setPhase(newPhase) {
            
            if ( phase === "work" ) {
            	work += Date.now() - last;
            } else if ( phase === "fun" ) {
            	fun += Date.now() - last;
            } else if ( phase === "neutral" ) {
            	none += Date.now() - last;
            }
            
            last = Date.now()
            phase = newPhase;
            
            // start of otehr programer code
            const buttons = document.querySelectorAll('#phaseButtons span');
            buttons.forEach(btn => btn.style.color = "#808080");
            event.target.style.color = "rgb(255,255,255)";
            // end of other programer code

            if (phase === "work") {
                setting.textContent = "Working";
                document.title = "Working"
                setting.style.color = "rgb(255,255,0)";
                favicon.href="yellow.svg";
            } else if (phase === "fun") {
                setting.textContent = "On Break";
                document.title = "Taking a break"
                setting.style.color = "rgb(0,255,255)";
                favicon.href="cyan.svg";
            } else if (phase === "neutral") {
                setting.textContent = "Neutral";
                document.title = 'Idle'
                setting.style.color = "rgb(0,255,0)";
                favicon.href="green.svg";
            }
            
            update()
        }

        function change( a ) {
        	if ( a < 0 ) {
            	work -= a;
            } else {
            	fun += a;
            }
        }
        
        function update() {
        	let rate = Math.round( ( fun + ( none / 2 ) ) / ( fun + work + none ) * 100 );
        	document.getElementById("funout").innerHTML = Math.round(fun/1000);
            document.getElementById("workout").innerHTML = Math.round(work/1000);
            document.getElementById("rateout").innerHTML = rate;
            document.getElementById("nowout").innerHTML = Math.round(((Date.now()-last)/6000))/10;
            output = `Is <a class="highlight">${document.title}</a>, and has been for <a class="highlight">${(Math.round(((Date.now()-last)/6000))/10)}</a> muinutes.<br>Total of <a class="highlight">${Math.round(work/6000)/10}</a> muinutes working and <a class="highlight">${Math.round(fun/6000)/10}</a> muinutes off-task.<br>They have spent <a class="highlight">${rate}</a>% of their time off task. (ideal 15-20%)`;
        }

        function putRepoData() {
            const octokit = new Octokit({
                auth: secrets.APIkey
            })
            
            await octokit.request('PUT /repos/LBCmolab/backend.LBCmolab.github.io/contents/workingTimerInfo.txt', {
                owner: 'LBCmolab',
                repo: 'backend.LBCmolab.github.io',
                path: 'workingTimerInfo.txt',
                message: 'API action',
                committer: {
                    name: 'LBCmolab',
                    email: 'LBCmolab@duck.com'
                },
                content: output,
                headers: {
                    'X-GitHub-Api-Version': '2026-03-10'
                }
            })
        }
        
        setInterval(update, 3000);
        setInterval(putRepoData, 10000);
    </script>
</body>
