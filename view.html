<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Monitoring</title>
    </head>
    <body>
        <h1>Monitoring</h1>
        <button id="fetchButton">Reload</button>
        <p></p>
        <div id="output"></div>
        
        <script>
            const token = 'ERROR'; 
            const repoOwner = 'LBCmolab';
            const repoName = 'backend.LBCmolab.github.io';
            
            async function fetchRepoData() {
                document.getElementById('output').innerText = "Fetching data...";
                const response = await fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/contents/workingTimerInfo.txt`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Accept': 'application/vnd.github.v3.raw'
                    }
                });
                if (response.ok) {
                    const data = await response.text();
                    document.getElementById('output').innerText = data;
                } else {
                    document.getElementById('output').innerText = "Oops! The program failed to get the data.";
                }
            }
    
            document.getElementById('fetchButton').onclick = fetchRepoData;
        </script>
    </body>
</html>
