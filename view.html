<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Monitoring</title>
        
        <style>
        	body {
            	font-family:sans-serif;
            }
        	a {
            	color:#000080;
                font-weight:bold;
            }
        </style>
    </head>
    <body>
        <h1>Monitoring</h1>
        Reloads every 3 seconds automaticaly. <button id="fetchButton">Reload now.</button>
        <p></p>
        <div id="output" style="font-family:monospace;background-color:#f0f0f0;">
        	Information will show here.
        </div>
        <p></p>
        <p>Sorry that there is so little formating, will be in a later update.</p>
        
        <script>
            const token = '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'; 
            const repoOwner = 'LBCmolab';
            const repoName = 'backend.LBCmolab.github.io';
            
            async function fetchRepoData() {
                document.getElementById('output').innerHTML = "<a style='font-size:20px;'>Fetching data...</a>";
                const response = await fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/contents/workingTimerInfo.txt`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Accept': 'application/vnd.github.v3.raw'
                    }
                });
                if (response.ok) {
                    const data = await response.text();
                    document.getElementById('output').innerHTML = data;
                } else {
                    document.getElementById('output').innerHTML = `<a style="color:red;">Oops! The program failed to get the data. Here is the crash information: ${response.status} - ${await response.text()}}</a>`;
                }
            }
            
            setInterval(fetchRepoData, 3000);
    
            document.getElementById('fetchButton').onclick = fetchRepoData;
        </script>
    </body>
</html>
